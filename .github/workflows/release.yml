name: Release

on:
  push:
    tags:
      - "v*" # Triggers on tags like v0.1.0

jobs:
  publish:
    runs-on: ubuntu-latest # "ubuntu-latest" is generally more standard than "ubuntu-slim"
    permissions:
      id-token: write  
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish